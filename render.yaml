# Render Blueprint — connect this repo in Render Dashboard → New → Blueprint
services:
  - type: web
    name: line-ai-secretary
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      # 只在 Upstash 未設定時用到的退路，內容不保證留存。
      - key: DATA_DIR
        value: /tmp/line-ai-data
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: BASE_URL
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      # 外部儲存：免費方案的檔案系統是暫存的，授權與對話記憶都靠這組保存。
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      # 晨間簡報端點的通行密碼；未設定時該端點不啟用。
      - key: CRON_SECRET
        sync: false
